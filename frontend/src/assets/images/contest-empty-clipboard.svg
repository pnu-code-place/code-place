<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clipboard shadow -->
  <rect x="18" y="20" width="68" height="84" rx="12" fill="#c4b8f5" opacity="0.4"/>
  <!-- Clipboard body -->
  <rect x="14" y="16" width="68" height="84" rx="12" fill="url(#clipGrad)"/>
  <!-- Clipboard inner paper -->
  <rect x="20" y="28" width="56" height="65" rx="8" fill="white" opacity="0.92"/>
  <!-- Clipboard clip top -->
  <rect x="34" y="10" width="28" height="14" rx="7" fill="url(#clipTopGrad)"/>
  <rect x="39" y="13" width="18" height="8" rx="4" fill="#d8d0ff"/>
  <!-- Checklist lines -->
  <!-- Item 1 - checked -->
  <circle cx="30" cy="44" r="5" fill="#7b6ef5"/>
  <polyline points="27.5,44 29.5,46 33,41" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="38" y="41" width="30" height="5" rx="2.5" fill="#e0dcff"/>
  <!-- Item 2 - checked -->
  <circle cx="30" cy="57" r="5" fill="#7b6ef5"/>
  <polyline points="27.5,57 29.5,59 33,54" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="38" y="54" width="24" height="5" rx="2.5" fill="#e0dcff"/>
  <!-- Item 3 - unchecked -->
  <circle cx="30" cy="70" r="5" fill="#c4b8f5"/>
  <rect x="38" y="67" width="28" height="5" rx="2.5" fill="#ede9ff"/>
  <!-- Item 4 - unchecked -->
  <circle cx="30" cy="83" r="5" fill="#c4b8f5"/>
  <rect x="38" y="80" width="20" height="5" rx="2.5" fill="#ede9ff"/>

  <!-- Pencil (rotated, bottom-right) -->
  <g transform="translate(75, 70) rotate(-35)">
    <!-- Pencil body -->
    <rect x="-6" y="-32" width="12" height="46" rx="3" fill="url(#pencilGrad)"/>
    <!-- Pencil tip -->
    <polygon points="-6,14 6,14 0,26" fill="#f0c878"/>
    <!-- Pencil tip point -->
    <polygon points="-2,22 2,22 0,26" fill="#d4956a"/>
    <!-- Pencil eraser -->
    <rect x="-6" y="-36" width="12" height="8" rx="3" fill="#f5a0a0"/>
    <rect x="-6" y="-32" width="12" height="3" fill="#e88a8a"/>
    <!-- Pencil shine -->
    <rect x="-3" y="-30" width="3" height="30" rx="1.5" fill="white" opacity="0.25"/>
    <!-- Pencil lines -->
    <line x1="-6" y1="-18" x2="6" y2="-18" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  </g>

  <defs>
    <linearGradient id="clipGrad" x1="14" y1="16" x2="82" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a89af7"/>
      <stop offset="100%" stop-color="#7b6ef5"/>
    </linearGradient>
    <linearGradient id="clipTopGrad" x1="34" y1="10" x2="62" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b5ce7"/>
      <stop offset="100%" stop-color="#5b4bd8"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="-6" y1="0" x2="6" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#e8b020"/>
    </linearGradient>
  </defs>
</svg>
