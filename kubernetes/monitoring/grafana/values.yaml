# ========================================================================

# 환경과 관계없이 공통으로 적용되는 설정을 정의합니다.
# 외부 도메인처럼 클러스터별로 달라져야 하는 값은 values-*.yaml에서 덮어씁니다.

# 데이터 영속성 설정
persistence:
  type: pvc
  enabled: true
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  size: 1Gi

# Ingress 설정은 기본 비활성화합니다. 공개 도메인은 values-*.yaml에서 설정합니다.
ingress:
  enabled: false
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.tls.certresolver: default
  hosts: []
  tls: []
