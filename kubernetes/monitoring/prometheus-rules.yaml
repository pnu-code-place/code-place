apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: codeplace-fast-alerts
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: codeplace.recording
      interval: 15s
      rules:
        - record: codeplace:api_request_rate5m
          expr: sum by (namespace) (rate(codeplace_http_requests_total{namespace=~"code-place-(dev|prod)"}[5m]))
        - record: codeplace:api_5xx_rate5m
          expr: sum by (namespace) (rate(codeplace_http_requests_total{namespace=~"code-place-(dev|prod)", status_code=~"5.."}[5m]))
        - record: codeplace:api_5xx_ratio5m
          expr: codeplace:api_5xx_rate5m / clamp_min(codeplace:api_request_rate5m, 0.001)
        - record: codeplace:api_p95_latency_seconds5m
          expr: histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_http_request_duration_seconds_bucket{namespace=~"code-place-(dev|prod)"}[5m])))
        - record: codeplace:ingress_request_rate2m
          expr: sum(rate(traefik_service_requests_total{exported_service=~"code-place-dev-.*"}[2m])) or sum(rate(traefik_service_requests_total{service=~"code-place-dev-.*"}[2m]))
          labels:
            namespace: code-place-dev
        - record: codeplace:ingress_5xx_rate2m
          expr: sum(rate(traefik_service_requests_total{exported_service=~"code-place-dev-.*", code=~"5.."}[2m])) or sum(rate(traefik_service_requests_total{service=~"code-place-dev-.*", code=~"5.."}[2m]))
          labels:
            namespace: code-place-dev
        - record: codeplace:ingress_request_rate2m
          expr: sum(rate(traefik_service_requests_total{exported_service=~"code-place-prod-.*"}[2m])) or sum(rate(traefik_service_requests_total{service=~"code-place-prod-.*"}[2m]))
          labels:
            namespace: code-place-prod
        - record: codeplace:ingress_5xx_rate2m
          expr: sum(rate(traefik_service_requests_total{exported_service=~"code-place-prod-.*", code=~"5.."}[2m])) or sum(rate(traefik_service_requests_total{service=~"code-place-prod-.*", code=~"5.."}[2m]))
          labels:
            namespace: code-place-prod
        - record: codeplace:public_endpoint_availability5m
          expr: avg by (environment, namespace, service, instance) (avg_over_time(probe_success{probe_type="public-http"}[5m]))
        - record: codeplace:judge_available_total
          expr: sum by (namespace) (codeplace_judge_server_available{namespace=~"code-place-(dev|prod)"})
        - record: codeplace:judge_waiting_queue_length
          expr: max by (namespace) (codeplace_waiting_queue_length{namespace=~"code-place-(dev|prod)"})
    - name: codeplace.p0
      interval: 15s
      rules:
        - alert: BackendTargetDown
          expr: (min(up{job="backend", namespace="code-place-dev"}) == 0) or absent(up{job="backend", namespace="code-place-dev"})
          for: 1m
          labels:
            namespace: code-place-dev
            severity: critical
            priority: P0
          annotations:
            summary: "Backend metrics target is down in dev"
            description: "Prometheus cannot scrape the dev backend /metrics endpoint, or the backend target series is missing, for 1 minute."
        - alert: BackendTargetDown
          expr: (min(up{job="backend", namespace="code-place-prod"}) == 0) or absent(up{job="backend", namespace="code-place-prod"})
          for: 1m
          labels:
            namespace: code-place-prod
            severity: critical
            priority: P0
          annotations:
            summary: "Backend metrics target is down in prod"
            description: "Prometheus cannot scrape the prod backend /metrics endpoint, or the backend target series is missing, for 1 minute."
        - alert: Api5xxSpike
          expr: sum by (namespace) (rate(codeplace_http_requests_total{namespace=~"code-place-(dev|prod)", status_code=~"5.."}[2m])) / clamp_min(sum by (namespace) (rate(codeplace_http_requests_total{namespace=~"code-place-(dev|prod)"}[2m])), 1) > 0.05
          for: 2m
          labels:
            severity: critical
            priority: P0
          annotations:
            summary: "Backend API 5xx rate is high"
            description: "Backend API 5xx responses are above 5% for 2 minutes."
        - alert: Ingress5xxSpike
          expr: codeplace:ingress_5xx_rate2m{namespace="code-place-dev"} / clamp_min(codeplace:ingress_request_rate2m{namespace="code-place-dev"}, 1) > 0.05
          for: 2m
          labels:
            namespace: code-place-dev
            severity: critical
            priority: P0
          annotations:
            summary: "Ingress 5xx rate is high in dev"
            description: "Traefik 5xx responses for code-place-dev are above 5% for 2 minutes."
        - alert: Ingress5xxSpike
          expr: codeplace:ingress_5xx_rate2m{namespace="code-place-prod"} / clamp_min(codeplace:ingress_request_rate2m{namespace="code-place-prod"}, 1) > 0.05
          for: 2m
          labels:
            namespace: code-place-prod
            severity: critical
            priority: P0
          annotations:
            summary: "Ingress 5xx rate is high in prod"
            description: "Traefik 5xx responses for code-place-prod are above 5% for 2 minutes."
        - alert: PublicEndpointDown
          expr: (probe_success{environment="prod", probe_type="public-http"} == 0) or absent(probe_success{environment="prod", service="frontend", probe_type="public-http"}) or absent(probe_success{environment="prod", service="hub-auth", probe_type="public-http"})
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-prod
          annotations:
            summary: "Public endpoint is down in prod"
            description: "A production synthetic HTTPS probe has failed for 1 minute."
        - alert: PublicEndpointTLSCritical
          expr: (probe_ssl_earliest_cert_expiry{probe_type="public-http", environment="prod"} - time()) < 259200
          for: 15m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-prod
          annotations:
            summary: "Public endpoint TLS certificate expires within 3 days"
            description: "The production CodePlace public HTTPS certificate expires within 3 days."
        - alert: JudgeAllUnavailable
          expr: (sum by (namespace) (codeplace_judge_server_available{namespace=~"code-place-(dev|prod)"}) == 0) or (max by (namespace) (up{job="backend", namespace=~"code-place-(dev|prod)"}) unless on (namespace) codeplace_judge_server_available{namespace=~"code-place-(dev|prod)"})
          for: 1m
          labels:
            severity: critical
            priority: P0
          annotations:
            summary: "No judge-server is available"
            description: "No enabled judge-server has a fresh heartbeat."
        - alert: JudgeHeartbeatCritical
          expr: max by (namespace) (codeplace_judge_server_last_heartbeat_age_seconds{namespace=~"code-place-(dev|prod)"}) > 180
          for: 1m
          labels:
            severity: critical
            priority: P0
          annotations:
            summary: "Judge-server heartbeat is stale"
            description: "A judge-server heartbeat is older than 180 seconds."
        - alert: PostgresUnavailable
          expr: (sum(kube_pod_status_ready{namespace="code-place-dev", condition="true", pod=~"postgres-[0-9]+"}) == 0) or absent(kube_pod_status_ready{namespace="code-place-dev", condition="true", pod=~"postgres-[0-9]+"})
          for: 1m
          labels:
            namespace: code-place-dev
            severity: critical
            priority: P0
          annotations:
            summary: "PostgreSQL pod is not ready in dev"
            description: "No dev PostgreSQL pod has been ready, or PostgreSQL pod readiness metrics are missing, for 1 minute."
        - alert: PostgresUnavailable
          expr: (sum(kube_pod_status_ready{namespace="code-place-prod", condition="true", pod=~"postgres-[0-9]+"}) == 0) or absent(kube_pod_status_ready{namespace="code-place-prod", condition="true", pod=~"postgres-[0-9]+"})
          for: 1m
          labels:
            namespace: code-place-prod
            severity: critical
            priority: P0
          annotations:
            summary: "PostgreSQL pod is not ready in prod"
            description: "No prod PostgreSQL pod has been ready, or PostgreSQL pod readiness metrics are missing, for 1 minute."
        - alert: RedisUnavailable
          expr: (sum(kube_pod_status_ready{namespace="code-place-dev", condition="true", pod=~"redis-.*|redis-replication-.*"}) == 0) or absent(kube_pod_status_ready{namespace="code-place-dev", condition="true", pod=~"redis-.*|redis-replication-.*"})
          for: 1m
          labels:
            namespace: code-place-dev
            severity: critical
            priority: P0
          annotations:
            summary: "Redis pod is not ready in dev"
            description: "No dev Redis/Sentinel pod has been ready, or Redis pod readiness metrics are missing, for 1 minute."
        - alert: RedisUnavailable
          expr: (sum(kube_pod_status_ready{namespace="code-place-prod", condition="true", pod=~"redis-.*|redis-replication-.*"}) == 0) or absent(kube_pod_status_ready{namespace="code-place-prod", condition="true", pod=~"redis-.*|redis-replication-.*"})
          for: 1m
          labels:
            namespace: code-place-prod
            severity: critical
            priority: P0
          annotations:
            summary: "Redis pod is not ready in prod"
            description: "No prod Redis/Sentinel pod has been ready, or Redis pod readiness metrics are missing, for 1 minute."
        - alert: PostgresExporterDown
          expr: (min(cnpg_collector_up{namespace="code-place-dev", cluster="postgres"}) == 0) or absent(cnpg_collector_up{namespace="code-place-dev", cluster="postgres"})
          for: 2m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-dev
          annotations:
            summary: "PostgreSQL metrics exporter is down"
            description: "Prometheus cannot collect CNPG PostgreSQL metrics for code-place-dev for 2 minutes."
        - alert: PostgresExporterDown
          expr: (min(cnpg_collector_up{namespace="code-place-prod", cluster="postgres"}) == 0) or absent(cnpg_collector_up{namespace="code-place-prod", cluster="postgres"})
          for: 2m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-prod
          annotations:
            summary: "PostgreSQL metrics exporter is down"
            description: "Prometheus cannot collect CNPG PostgreSQL metrics for code-place-prod for 2 minutes."
        - alert: RedisExporterDown
          expr: (min(redis_up{namespace="code-place-dev"}) == 0) or absent(redis_up{namespace="code-place-dev"})
          for: 2m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-dev
          annotations:
            summary: "Redis metrics exporter is down"
            description: "Prometheus cannot collect Redis exporter metrics for code-place-dev for 2 minutes."
        - alert: RedisExporterDown
          expr: (min(redis_up{namespace="code-place-prod"}) == 0) or absent(redis_up{namespace="code-place-prod"})
          for: 2m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-prod
          annotations:
            summary: "Redis metrics exporter is down"
            description: "Prometheus cannot collect Redis exporter metrics for code-place-prod for 2 minutes."
        - alert: LokiUnavailable
          expr: (sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"loki-[0-9]+"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"loki-[0-9]+"})
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: monitoring
          annotations:
            summary: "Loki is not ready"
            description: "No Loki single-binary pod has been ready for 1 minute. Log ingestion and log queries may be unavailable."
        - alert: LonghornManagerDown
          expr: (sum(kube_pod_status_ready{namespace="longhorn-system", condition="true", pod=~"longhorn-manager-.*"}) == 0) or absent(kube_pod_status_ready{namespace="longhorn-system", condition="true", pod=~"longhorn-manager-.*"})
          for: 2m
          labels:
            severity: critical
            priority: P0
            namespace: longhorn-system
          annotations:
            summary: "Longhorn managers are not ready"
            description: "No Longhorn manager pod has been ready for 2 minutes. PVC health and Longhorn metrics may be unavailable."
        - alert: LonghornManagerReplicaUnavailable
          expr: kube_daemonset_status_number_available{namespace="longhorn-system", daemonset="longhorn-manager"} < kube_daemonset_status_desired_number_scheduled{namespace="longhorn-system", daemonset="longhorn-manager"}
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: longhorn-system
          annotations:
            summary: "Longhorn manager replica is unavailable"
            description: "At least one Longhorn manager replica is unavailable for 5 minutes. Storage health visibility and volume operations are degraded."
        - alert: LonghornVolumeFaulted
          expr: longhorn_volume_robustness == 3
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: longhorn-system
          annotations:
            summary: "Longhorn volume is faulted"
            description: "A Longhorn volume is faulted for 1 minute. A PVC-backed workload may lose storage availability."
        - alert: LonghornVolumeReadOnly
          expr: longhorn_volume_file_system_read_only == 1
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: longhorn-system
          annotations:
            summary: "Longhorn volume is read-only"
            description: "A Longhorn volume filesystem is read-only for 1 minute. Writes from the attached workload may fail."
        - alert: VLLMUnavailable
          expr: (up{job="vllm", namespace="code-place-prod"} == 0) or absent(up{job="vllm", namespace="code-place-prod"})
          for: 2m
          labels:
            severity: critical
            priority: P0
            namespace: code-place-prod
          annotations:
            summary: "vLLM metrics target is unavailable"
            description: "Prometheus cannot scrape the vLLM /metrics endpoint for 2 minutes. AI hint serving may be unavailable."
        - alert: GPUXIDError
          expr: max by (Hostname, gpu, UUID) (DCGM_FI_DEV_XID_ERRORS{namespace="monitoring"}) > 0
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: monitoring
          annotations:
            summary: "GPU driver reported an XID error"
            description: "DCGM reports a non-zero NVIDIA XID error for 1 minute. vLLM GPU health and node driver state should be checked."
        - alert: PrometheusUnavailable
          expr: (max(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"prometheus-kube-prometheus-stack-prometheus-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"prometheus-kube-prometheus-stack-prometheus-.*"})
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: monitoring
          annotations:
            summary: "Prometheus is not ready"
            description: "The kube-prometheus-stack Prometheus pod has not been ready for 1 minute. Metric collection, rule evaluation, and alert delivery may be unavailable."
        - alert: AlertmanagerUnavailable
          expr: (max(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"alertmanager-kube-prometheus-stack-alertmanager-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"alertmanager-kube-prometheus-stack-alertmanager-.*"})
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: monitoring
          annotations:
            summary: "Alertmanager is not ready"
            description: "The kube-prometheus-stack Alertmanager pod has not been ready for 1 minute. Fast alert delivery may be unavailable."
        - alert: AlertmanagerWebhookSecretMissing
          expr: absent(kube_secret_info{namespace="monitoring", secret="alertmanager-contact-points"})
          for: 1m
          labels:
            severity: critical
            priority: P0
            namespace: monitoring
          annotations:
            summary: "Alertmanager Discord webhook secret is missing"
            description: "The monitoring namespace does not expose the alertmanager-contact-points Secret through kube-state-metrics. Discord notifications cannot work until the SealedSecret is decrypted into this Secret."
    - name: codeplace.p1
      interval: 30s
      rules:
        - alert: ApiLatencyHigh
          expr: histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_http_request_duration_seconds_bucket{namespace=~"code-place-(dev|prod)"}[5m]))) > 2
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Backend API p95 latency is high"
            description: "Backend API p95 latency is above 2 seconds for 5 minutes."
        - alert: PublicEndpointDown
          expr: (probe_success{environment="dev", probe_type="public-http"} == 0) or absent(probe_success{environment="dev", service="frontend", probe_type="public-http"}) or absent(probe_success{environment="dev", service="hub-auth", probe_type="public-http"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: code-place-dev
          annotations:
            summary: "Public endpoint is down in dev"
            description: "A dev synthetic HTTPS probe has failed for 2 minutes."
        - alert: PublicEndpointLatencyHigh
          expr: probe_duration_seconds{probe_type="public-http"} > 2
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Public frontend endpoint latency is high"
            description: "A synthetic HTTPS probe has taken more than 2 seconds for 5 minutes."
        - alert: PublicEndpointTLSExpiringSoon
          expr: (probe_ssl_earliest_cert_expiry{probe_type="public-http"} - time()) < 1209600
          for: 1h
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Public endpoint TLS certificate expires within 14 days"
            description: "A CodePlace public HTTPS certificate expires within 14 days."
        - alert: FrontendRuntimeErrorsSpike
          expr: sum by (namespace, surface) (increase(codeplace_frontend_error_total{namespace=~"code-place-(dev|prod)"}[5m])) > 10
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Frontend runtime errors increased"
            description: "Browser clients reported more than 10 frontend runtime errors in 5 minutes. Check recent deploys, Sentry events, and frontend.error logs."
        - alert: BlackboxExporterUnavailable
          expr: (max(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"blackbox-exporter-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"blackbox-exporter-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Blackbox exporter is not ready"
            description: "The synthetic public endpoint probe exporter has not been ready for 2 minutes."
        - alert: BlackboxExporterReplicaUnavailable
          expr: kube_deployment_status_replicas_available{namespace="monitoring", deployment="blackbox-exporter"} < kube_deployment_spec_replicas{namespace="monitoring", deployment="blackbox-exporter"}
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Blackbox exporter replica is unavailable"
            description: "At least one synthetic public endpoint probe exporter replica is unavailable for 5 minutes. Public endpoint probing is degraded."
        - alert: GrafanaPublicEndpointDown
          expr: (probe_success{environment="monitoring", service="grafana", probe_type="public-http"} == 0) or absent(probe_success{environment="monitoring", service="grafana", probe_type="public-http"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Grafana public endpoint is down"
            description: "The public Grafana monitoring endpoint synthetic HTTPS probe has failed for 2 minutes. Dashboards may be unavailable even if the Grafana pod is ready."
        - alert: KubernetesEventExporterUnavailable
          expr: (max(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"kubernetes-event-exporter-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"kubernetes-event-exporter-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Kubernetes event exporter is not ready"
            description: "Kubernetes Warning events may not be available in Loki for deployment and scheduling failure triage."
        - alert: GrafanaUnavailable
          expr: (max(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"kube-prometheus-stack-grafana-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"kube-prometheus-stack-grafana-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Grafana is not ready"
            description: "No kube-prometheus-stack Grafana pod in the monitoring namespace has been ready for 2 minutes. Dashboards and Explore may be unavailable."
        - alert: GrafanaMetricsTargetDown
          expr: (up{namespace="monitoring", service="kube-prometheus-stack-grafana"} == 0) or absent(up{namespace="monitoring", service="kube-prometheus-stack-grafana"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Grafana metrics target is down"
            description: "Prometheus cannot scrape Grafana /metrics for 2 minutes. Grafana may still serve UI, but dashboard/datasource/provisioning health visibility is degraded."
        - alert: MonitoringServiceMetricsTargetDown
          expr: (up{namespace="monitoring", service=~"blackbox-exporter|kubernetes-event-exporter|otel-collector|tempo|kube-prometheus-stack-grafana|loki|loki-canary|alloy"} == 0) or (kube_service_info{namespace="monitoring", service=~"blackbox-exporter|kubernetes-event-exporter|otel-collector|tempo|kube-prometheus-stack-grafana|loki|loki-canary|alloy"} unless on (namespace, service) up{namespace="monitoring", service=~"blackbox-exporter|kubernetes-event-exporter|otel-collector|tempo|kube-prometheus-stack-grafana|loki|loki-canary|alloy"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "A monitoring service metrics target is down"
            description: "A monitoring Service exists but Prometheus cannot scrape its metrics target for 2 minutes, or the target series is missing. Check ServiceMonitor selection, Service port names, Pod readiness, and generated Prometheus config."
        - alert: PrometheusOperatorUnavailable
          expr: (max(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"kube-prometheus-stack-operator-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"kube-prometheus-stack-operator-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Prometheus Operator is not ready"
            description: "The kube-prometheus-stack operator has not been ready for 2 minutes. ServiceMonitor, PodMonitor, PrometheusRule, and AlertmanagerConfig reconciliation may be stalled."
        - alert: PrometheusRuleEvaluationFailures
          expr: sum(increase(prometheus_rule_evaluation_failures_total[5m])) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Prometheus rule evaluation is failing"
            description: "Prometheus has reported rule evaluation failures for 5 minutes. Alert and recording rule expressions should be checked."
        - alert: PrometheusConfigReloadFailed
          expr: (max(prometheus_config_last_reload_successful{namespace="monitoring"}) == 0) or absent(prometheus_config_last_reload_successful{namespace="monitoring"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Prometheus config reload is failing"
            description: "Prometheus has not successfully reloaded its generated configuration for 2 minutes, or the reload metric is missing. ServiceMonitor, Probe, and rule changes may not be active."
        - alert: PrometheusAlertmanagerDiscoveryFailed
          expr: (max(prometheus_notifications_alertmanagers_discovered) < 1) or absent(prometheus_notifications_alertmanagers_discovered)
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Prometheus has not discovered Alertmanager"
            description: "Prometheus has discovered zero Alertmanager targets for 2 minutes. Alert delivery may be broken even if alert rules are firing."
        - alert: PrometheusReplicaUnavailable
          expr: sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"prometheus-kube-prometheus-stack-prometheus-.*"}) < 2
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Prometheus replica count is degraded"
            description: "Fewer than 2 Prometheus replicas have been ready for 5 minutes. Metric collection and alert evaluation still work, but the monitoring path has lost HA."
        - alert: AlertmanagerReplicaUnavailable
          expr: sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"alertmanager-kube-prometheus-stack-alertmanager-.*"}) < 2
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Alertmanager replica count is degraded"
            description: "Fewer than 2 Alertmanager replicas have been ready for 5 minutes. Alert delivery still works, but the notification path has lost HA."
        - alert: AlertmanagerConfigReloadFailed
          expr: (max(alertmanager_config_last_reload_successful{namespace="monitoring"}) == 0) or absent(alertmanager_config_last_reload_successful{namespace="monitoring"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Alertmanager config reload is failing"
            description: "Alertmanager has not successfully reloaded its generated configuration for 2 minutes, or the reload metric is missing. Check AlertmanagerConfig, webhook Secret references, and operator reconciliation."
        - alert: AlertmanagerNotificationFailures
          expr: sum(increase(alertmanager_notifications_failed_total[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Alertmanager notification delivery is failing"
            description: "Alertmanager has failed to send one or more notifications in the last 5 minutes. Check Discord webhook secret, receiver config, outbound network, and Alertmanager logs."
        - alert: JudgeWaitingQueueBacklog
          expr: codeplace_waiting_queue_length{namespace=~"code-place-(dev|prod)"} > 5
          for: 3m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Judge waiting queue is backing up"
            description: "More than 5 submissions are waiting because no judge-server was available."
        - alert: CeleryBrokerQueueBacklog
          expr: codeplace_celery_broker_queue_length{namespace=~"code-place-(dev|prod)"} > 20
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Celery broker queue is backing up"
            description: "More than 20 Celery tasks have been waiting in the Redis broker default queue for 5 minutes. Check celery-worker capacity, Redis broker health, and task errors."
        - alert: CodePlaceCollectorFailed
          expr: codeplace_observability_collector_success{namespace=~"code-place-(dev|prod)"} == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "A CodePlace custom metrics collector is failing"
            description: "A backend /metrics collector block has failed for 5 minutes. Metric values may be stale or zero even though the scrape target is up."
        - alert: SubmissionCreateSystemFailures
          expr: sum by (namespace, scope, status) (increase(codeplace_submission_create_outcome_total{namespace=~"code-place-(dev|prod)", status=~"db_error|enqueue_error"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Submission create path has system failures"
            description: "Submission creation is reporting DB or judge enqueue failures. Check backend logs, PostgreSQL, Redis/Celery broker, and judge task queue."
        - alert: JudgeTaskFailures
          expr: sum by (namespace, scope, status) (increase(codeplace_judge_task_outcome_total{namespace=~"code-place-(dev|prod)", status=~"error|submission_missing|user_missing"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Judge task failures detected"
            description: "Celery judge_task is failing before or during judge dispatch. Check celery-worker logs, submission/user rows, judge-server availability, and result save path."
        - alert: CeleryWorkerRestarting
          expr: sum by (namespace) (increase(kube_pod_container_status_restarts_total{namespace=~"code-place-(dev|prod)", pod=~"celery-worker-.*"}[15m])) > 3
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Celery worker is restarting repeatedly"
            description: "Celery worker pods restarted more than 3 times in 15 minutes."
        - alert: CeleryBeatDown
          expr: (kube_deployment_status_replicas_available{namespace=~"code-place-(dev|prod)", deployment="celery-beat"} < 1) or (kube_deployment_spec_replicas{namespace=~"code-place-(dev|prod)", deployment="celery-beat"} unless on (namespace, deployment) kube_deployment_status_replicas_available{namespace=~"code-place-(dev|prod)", deployment="celery-beat"})
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Celery beat is not ready"
            description: "The celery-beat Deployment has no available replica for 2 minutes, or its availability metric is missing."
        - alert: CeleryTaskFailures
          expr: sum by (namespace, task_name) (increase(codeplace_celery_task_total{namespace=~"code-place-(dev|prod)", status="failure"}[10m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Celery task failures detected"
            description: "A Celery task has failed in the last 10 minutes."
        - alert: CeleryTaskRetries
          expr: sum by (namespace, task_name) (increase(codeplace_celery_task_total{namespace=~"code-place-(dev|prod)", status="retry"}[10m])) > 3
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Celery task retries are elevated"
            description: "A Celery task retried more than 3 times in 10 minutes."
        - alert: CeleryTaskRuntimeHigh
          expr: histogram_quantile(0.95, sum by (namespace, task_name, le) (rate(codeplace_celery_task_runtime_seconds_bucket{namespace=~"code-place-(dev|prod)"}[10m]))) > 120
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Celery task runtime is high"
            description: "Celery task p95 runtime has been above 120 seconds for 10 minutes."
        - alert: CeleryMinuteScheduledTaskStale
          expr: >-
            (codeplace_celery_task_last_success_age_seconds{namespace=~"code-place-(dev|prod)", task_name="account.tasks.calculate_user_score_fluctuation"} > 600)
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-dev", task_name="account.tasks.calculate_user_score_fluctuation"})
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-prod", task_name="account.tasks.calculate_user_score_fluctuation"})
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Minute scheduled Celery task is stale"
            description: "calculate_user_score_fluctuation has not completed successfully for more than 10 minutes, or no success metric has ever been observed. Check celery-beat, celery-worker, Redis broker, and task logs."
        - alert: CeleryDailyScheduledTaskStale
          expr: >-
            (codeplace_celery_task_last_success_age_seconds{namespace=~"code-place-(dev|prod)", task_name="account.tasks.calculate_user_score_basis"} > 93600)
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-dev", task_name="account.tasks.calculate_user_score_basis"})
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-prod", task_name="account.tasks.calculate_user_score_basis"})
          for: 30m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Daily scheduled Celery task is stale"
            description: "calculate_user_score_basis has not completed successfully for more than 26 hours, or no success metric has ever been observed. Check celery-beat, celery-worker, Redis broker, and task logs."
        - alert: CeleryWeeklyScheduledTaskStale
          expr: >-
            (codeplace_celery_task_last_success_age_seconds{namespace=~"code-place-(dev|prod)", task_name=~"problem.tasks.update_weekly_stats|problem.tasks.update_bonus_problem"} > 691200)
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-dev", task_name="problem.tasks.update_weekly_stats"})
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-prod", task_name="problem.tasks.update_weekly_stats"})
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-dev", task_name="problem.tasks.update_bonus_problem"})
            or absent(codeplace_celery_task_last_success_age_seconds{namespace="code-place-prod", task_name="problem.tasks.update_bonus_problem"})
          for: 1h
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Weekly scheduled Celery task is stale"
            description: "A weekly problem maintenance task has not completed successfully for more than 8 days, or no success metric has ever been observed. Check celery-beat, celery-worker, Redis broker, and task logs."
        - alert: PodCrashLooping
          expr: sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~"code-place-(dev|prod)", pod=~"backend-.*|frontend-.*|hub-auth-.*|celery-.*|judge-server-.*|vllm-.*"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace pod is restarting"
            description: "A CodePlace application pod has restarted within the last 5 minutes."
        - alert: CodePlacePodNotReady
          expr: max by (namespace, pod) (kube_pod_status_ready{namespace=~"code-place-(dev|prod)", condition="true", pod=~"backend-.*|frontend-.*|hub-auth-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*|vllm-.*"}) == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace pod is not ready"
            description: "A CodePlace application or datastore pod has not been ready for 5 minutes."
        - alert: KubernetesPodImagePullBackOff
          expr: max by (namespace, pod, container, reason) (kube_pod_container_status_waiting_reason{namespace=~"code-place-(dev|prod)|monitoring", reason=~"ImagePullBackOff|ErrImagePull"}) == 1
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "A Kubernetes pod cannot pull its image"
            description: "A pod has been waiting with ImagePullBackOff or ErrImagePull for 2 minutes. Check image tag, registry access, and image pull secret."
        - alert: KubernetesPodCrashLoopBackOff
          expr: max by (namespace, pod, container) (kube_pod_container_status_waiting_reason{namespace=~"code-place-(dev|prod)|monitoring", reason="CrashLoopBackOff"}) == 1
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "A Kubernetes pod is in CrashLoopBackOff"
            description: "A pod has been waiting with CrashLoopBackOff for 5 minutes. Check the previous container logs and Kubernetes Warning events."
        - alert: KubernetesPodOOMKilled
          expr: max by (namespace, pod, container) (max_over_time(kube_pod_container_status_last_terminated_reason{namespace=~"code-place-(dev|prod)|monitoring", reason="OOMKilled"}[10m])) == 1
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "A Kubernetes container was OOMKilled"
            description: "A container was terminated by OOMKilled within the last 10 minutes. Check memory limits, recent traffic, and heap/cache growth."
        - alert: KubernetesPodUnschedulable
          expr: (max by (namespace, pod) (kube_pod_status_unschedulable{namespace=~"code-place-(dev|prod)|monitoring"}) == 1) or (max by (namespace, pod) (kube_pod_status_phase{namespace=~"code-place-(dev|prod)|monitoring", phase="Pending"}) == 1)
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "A Kubernetes pod is pending or unschedulable"
            description: "A pod has been pending or unschedulable for 10 minutes. Check node capacity, taints, affinity, PVC binding, and FailedScheduling events."
        - alert: CodePlaceDeploymentUnavailable
          expr: max by (namespace, deployment) (kube_deployment_status_replicas_unavailable{namespace=~"code-place-(dev|prod)", deployment=~"backend|frontend|hub-auth|celery-worker|celery-beat|judge-server|vllm"}) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace deployment has unavailable replicas"
            description: "A CodePlace deployment has had unavailable replicas for 5 minutes. Check rollout status, pod events, readiness probes, image pulls, and resource pressure."
        - alert: CodePlaceDeploymentRolloutStuck
          expr: max by (namespace, deployment) (kube_deployment_status_observed_generation{namespace=~"code-place-(dev|prod)", deployment=~"backend|frontend|hub-auth|celery-worker|celery-beat|judge-server|vllm"} != on (namespace, deployment) kube_deployment_metadata_generation{namespace=~"code-place-(dev|prod)", deployment=~"backend|frontend|hub-auth|celery-worker|celery-beat|judge-server|vllm"}) > 0
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace deployment rollout is stuck"
            description: "A CodePlace deployment observed generation has not caught up with metadata generation for 10 minutes. Check deployment events, ReplicaSet state, and rollout history."
        - alert: CodePlacePDBAtRisk
          expr: kube_poddisruptionbudget_status_current_healthy{namespace=~"code-place-(dev|prod)", poddisruptionbudget=~"backend|frontend"} <= kube_poddisruptionbudget_status_desired_healthy{namespace=~"code-place-(dev|prod)", poddisruptionbudget=~"backend|frontend"}
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace PDB has no disruption headroom"
            description: "A backend or frontend PodDisruptionBudget has been at or below its desired healthy count for 10 minutes. Node drain or voluntary disruption may reduce user-path availability."
        - alert: CodePlaceServiceNoReadyEndpoints
          expr: (max by (namespace, endpoint) (kube_endpoint_address_available{namespace=~"code-place-(dev|prod)", endpoint=~"backend|frontend|hub-auth|judge-server"}) < 1) or (label_replace(kube_service_info{namespace=~"code-place-(dev|prod)", service=~"backend|frontend|hub-auth|judge-server"}, "endpoint", "$1", "service", "(.*)") unless on (namespace, endpoint) kube_endpoint_address_available{namespace=~"code-place-(dev|prod)", endpoint=~"backend|frontend|hub-auth|judge-server"})
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace service has no ready endpoints"
            description: "A CodePlace Service has had zero ready endpoints for 2 minutes, or the endpoint availability metric is missing while the Service exists. Check Service selector labels, Pod readiness, EndpointSlice state, and rollout events."
        - alert: VLLMServiceNoReadyEndpoints
          expr: (max by (namespace, endpoint) (kube_endpoint_address_available{namespace="code-place-prod", endpoint="vllm"}) < 1) or (label_replace(kube_service_info{namespace="code-place-prod", service="vllm"}, "endpoint", "$1", "service", "(.*)") unless on (namespace, endpoint) kube_endpoint_address_available{namespace="code-place-prod", endpoint="vllm"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: code-place-prod
          annotations:
            summary: "vLLM service has no ready endpoints"
            description: "The prod vLLM Service has had zero ready endpoints for 2 minutes, or the endpoint availability metric is missing while the Service exists. AI hint routing may fail even if the Service object exists."
        - alert: CodePlaceContainerCPUHigh
          expr: sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{namespace=~"code-place-(dev|prod)", container!="", pod=~"backend-.*|frontend-.*|hub-auth-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*|vllm-.*"}[5m])) / clamp_min(sum by (namespace, pod, container) (kube_pod_container_resource_limits{namespace=~"code-place-(dev|prod)", resource="cpu", unit="core", pod=~"backend-.*|frontend-.*|hub-auth-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*|vllm-.*"}), 0.001) > 0.8
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace container CPU usage is high"
            description: "A CodePlace container has used more than 80% of its CPU limit for 10 minutes."
        - alert: CodePlaceContainerMemoryHigh
          expr: max by (namespace, pod, container) (container_memory_working_set_bytes{namespace=~"code-place-(dev|prod)", container!="", pod=~"backend-.*|frontend-.*|hub-auth-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*|vllm-.*"}) / clamp_min(sum by (namespace, pod, container) (kube_pod_container_resource_limits{namespace=~"code-place-(dev|prod)", resource="memory", unit="byte", pod=~"backend-.*|frontend-.*|hub-auth-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*|vllm-.*"}), 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "CodePlace container memory usage is high"
            description: "A CodePlace container has used more than 85% of its memory limit for 10 minutes."
        - alert: PostgresCollectorError
          expr: max by (namespace, pod) (cnpg_collector_last_collection_error{namespace=~"code-place-(dev|prod)", cluster="postgres"}) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "PostgreSQL metrics collection is failing"
            description: "CNPG PostgreSQL metrics collection has reported errors for 5 minutes."
        - alert: PostgresHADegraded
          expr: min by (namespace) (cnpg_collector_nodes_used{namespace=~"code-place-(dev|prod)", cluster="postgres"}) < 3
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "PostgreSQL HA placement is degraded"
            description: "CNPG reports fewer than 3 distinct nodes for PostgreSQL instances for 10 minutes."
        - alert: PostgresReplicaUnavailable
          expr: sum by (namespace) (kube_pod_status_ready{namespace=~"code-place-(dev|prod)", condition="true", pod=~"postgres-[0-9]+"}) < 3
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "PostgreSQL ready replica count is degraded"
            description: "Fewer than 3 PostgreSQL pods have been ready for 5 minutes. Failover capacity or quorum may be reduced."
        - alert: RedisReplicaUnavailable
          expr: sum by (namespace) (kube_pod_status_ready{namespace=~"code-place-(dev|prod)", condition="true", pod=~"redis-.*|redis-replication-.*"}) < 6
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Redis/Sentinel ready replica count is degraded"
            description: "Fewer than 6 Redis replication and Sentinel pods have been ready for 5 minutes. Redis failover capacity may be reduced."
        - alert: RedisMemoryHigh
          expr: (max by (namespace, pod) (redis_memory_used_bytes{namespace=~"code-place-(dev|prod)"}) / max by (namespace, pod) (redis_memory_max_bytes{namespace=~"code-place-(dev|prod)"}) > 0.85) and on (namespace, pod) max by (namespace, pod) (redis_memory_max_bytes{namespace=~"code-place-(dev|prod)"}) > 0
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Redis memory usage is high"
            description: "Redis exporter reports memory usage above 85% of configured maxmemory for 10 minutes."
        - alert: RedisConnectedClientsHigh
          expr: (codeplace_redis_connected_clients{namespace=~"code-place-(dev|prod)"} / clamp_min(codeplace_redis_max_clients{namespace=~"code-place-(dev|prod)"}, 1) > 0.8) and codeplace_redis_max_clients{namespace=~"code-place-(dev|prod)"} > 0
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Redis connected clients usage is high"
            description: "Backend reports Redis connected clients above 80% of maxclients for 10 minutes."
        - alert: RedisRejectedConnections
          expr: increase(codeplace_redis_rejected_connections_total{namespace=~"code-place-(dev|prod)"}[5m]) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Redis rejected connections detected"
            description: "Backend reports Redis rejected connections in the last 5 minutes. Check maxclients, connection pooling, and Redis resource pressure."
        - alert: PVCAlmostFull
          expr: max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace=~"code-place-(dev|prod)"}) / clamp_min(max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_capacity_bytes{namespace=~"code-place-(dev|prod)"}), 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "PVC usage is above 85%"
            description: "A persistent volume claim has been above 85% usage for 10 minutes."
        - alert: LokiPVCAlmostFull
          expr: max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace="monitoring", persistentvolumeclaim=~".*loki.*"}) / clamp_min(max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_capacity_bytes{namespace="monitoring", persistentvolumeclaim=~".*loki.*"}), 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Loki PVC usage is above 85%"
            description: "The Loki Longhorn PVC has been above 85% usage for 10 minutes. Log retention or PVC size must be adjusted before ingestion stops."
        - alert: MonitoringPVCAlmostFull
          expr: max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace="monitoring", persistentvolumeclaim!~".*loki.*|tempo-data"}) / clamp_min(max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_capacity_bytes{namespace="monitoring", persistentvolumeclaim!~".*loki.*|tempo-data"}), 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Monitoring PVC usage is above 85%"
            description: "A Prometheus, Alertmanager, Grafana, or monitoring support PVC has been above 85% usage for 10 minutes. Check retention, WAL growth, and Longhorn capacity."
        - alert: AlloyDaemonSetUnavailable
          expr: (kube_daemonset_status_number_available{namespace="monitoring", daemonset="alloy"} < kube_daemonset_status_desired_number_scheduled{namespace="monitoring", daemonset="alloy"}) or absent(kube_daemonset_status_desired_number_scheduled{namespace="monitoring", daemonset="alloy"})
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Alloy log collector is not running on every node"
            description: "At least one node is missing an available Alloy DaemonSet pod for 5 minutes. Logs from that node may be missing."
        - alert: LokiGatewayUnavailable
          expr: (sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"loki-gateway-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"loki-gateway-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Loki gateway is not ready"
            description: "No Loki gateway replica has been ready for 2 minutes. Alloy writes and Grafana Loki queries may fail."
        - alert: LokiGatewayReplicaUnavailable
          expr: sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"loki-gateway-.*"}) < 2
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Loki gateway replica count is degraded"
            description: "Fewer than 2 Loki gateway replicas have been ready for 5 minutes. Loki writes and queries still work, but the gateway path has lost HA."
        - alert: LokiIngestionStalled
          expr: (sum(rate(loki_distributor_lines_received_total{namespace="monitoring"}[5m])) == 0) or absent(loki_distributor_lines_received_total{namespace="monitoring"})
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Loki is receiving no log lines"
            description: "Loki has received zero log lines for 10 minutes. Check Alloy discovery, Loki gateway writes, and Loki ingestion health."
        - alert: LokiRequestErrors
          expr: sum(rate(loki_request_duration_seconds_count{namespace="monitoring", status_code=~"5.."}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Loki is returning 5xx responses"
            description: "Loki has returned 5xx responses for 5 minutes. Log writes or Grafana log queries may be failing."
        - alert: LokiCanaryMissingEntries
          expr: sum(increase(loki_canary_missing_entries_total{namespace="monitoring"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Loki canary cannot read back written logs"
            description: "Loki canary reports missing entries. Loki may be accepting writes while queries or storage are unhealthy."
        - alert: AlloyLokiWriteDrops
          expr: sum(increase(loki_write_dropped_entries_total{namespace="monitoring"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Alloy is dropping log entries"
            description: "Alloy dropped log entries before writing to Loki. Check Alloy limits, Loki gateway errors, and backpressure."
        - alert: AlloyLokiWriteRetries
          expr: sum(increase(loki_write_batch_retries_total{namespace="monitoring"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Alloy is retrying Loki writes"
            description: "Alloy has retried Loki write batches for 5 minutes. Loki writes may be slow or intermittently failing."
        - alert: OTelCollectorUnavailable
          expr: (sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"otel-collector-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"otel-collector-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "OpenTelemetry Collector is not ready"
            description: "No OpenTelemetry Collector replica has been ready for 2 minutes. Enabled services cannot export traces."
        - alert: OTelCollectorReplicaUnavailable
          expr: kube_deployment_status_replicas_available{namespace="monitoring", deployment="otel-collector"} < kube_deployment_spec_replicas{namespace="monitoring", deployment="otel-collector"}
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "OpenTelemetry Collector replica is unavailable"
            description: "At least one OpenTelemetry Collector replica is unavailable for 5 minutes. Trace ingestion is still degraded even if another replica is serving traffic."
        - alert: OTelCollectorRefusedSpans
          expr: sum(increase(otelcol_receiver_refused_spans_total{namespace="monitoring"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "OpenTelemetry Collector is refusing spans"
            description: "The OpenTelemetry Collector has refused incoming spans in the last 5 minutes. Check collector limits, receiver errors, and backend/celery OTLP client logs."
        - alert: OTelCollectorExportFailures
          expr: sum(increase(otelcol_exporter_send_failed_spans_total{namespace="monitoring"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "OpenTelemetry Collector cannot export spans"
            description: "The OpenTelemetry Collector has failed to export spans to Tempo in the last 5 minutes. Check Tempo readiness, collector exporter logs, and network path."
        - alert: TempoUnavailable
          expr: (sum(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"tempo-.*"}) == 0) or absent(kube_pod_status_ready{namespace="monitoring", condition="true", pod=~"tempo-.*"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Tempo is not ready"
            description: "No Tempo pod has been ready for 2 minutes. Trace queries and trace ingestion may fail."
        - alert: TempoPVCAlmostFull
          expr: max(kubelet_volume_stats_used_bytes{namespace="monitoring", persistentvolumeclaim="tempo-data"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace="monitoring", persistentvolumeclaim="tempo-data"}), 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "Tempo PVC usage is above 85%"
            description: "The Tempo Longhorn PVC has been above 85% usage for 10 minutes. Trace retention or PVC size must be adjusted."
        - alert: LonghornVolumeDegraded
          expr: longhorn_volume_robustness == 2
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: longhorn-system
          annotations:
            summary: "Longhorn volume is degraded"
            description: "A Longhorn volume has been degraded for 5 minutes. Replica rebuild, node health, and disk pressure should be checked."
        - alert: LonghornNodeNotReady
          expr: longhorn_node_status{condition="ready"} == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: longhorn-system
          annotations:
            summary: "Longhorn node is not ready"
            description: "A Longhorn node has not been ready for 5 minutes."
        - alert: LonghornDiskNotReady
          expr: longhorn_disk_status{condition="ready"} == 0
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: longhorn-system
          annotations:
            summary: "Longhorn disk is not ready"
            description: "A Longhorn disk has not been ready for 5 minutes."
        - alert: LonghornNodeStorageHigh
          expr: (longhorn_node_storage_usage_bytes + longhorn_node_storage_reservation_bytes) / clamp_min(longhorn_node_storage_capacity_bytes, 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: longhorn-system
          annotations:
            summary: "Longhorn node storage usage is high"
            description: "A Longhorn node has used or reserved more than 85% of available storage for 10 minutes."
        - alert: LonghornDiskUsageHigh
          expr: (longhorn_disk_usage_bytes + longhorn_disk_reservation_bytes) / clamp_min(longhorn_disk_capacity_bytes, 1) > 0.85
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: longhorn-system
          annotations:
            summary: "Longhorn disk usage is high"
            description: "A Longhorn disk has used or reserved more than 85% of capacity for 10 minutes."
        - alert: VLLMWaitingQueueHigh
          expr: max({__name__="vllm:num_requests_waiting", namespace="code-place-prod"}) > 5
          for: 5m
          labels:
            severity: warning
            priority: P1
            namespace: code-place-prod
          annotations:
            summary: "vLLM request waiting queue is high"
            description: "More than 5 vLLM requests have been waiting for 5 minutes. AI hint latency may be elevated."
        - alert: VLLMKVCacheHigh
          expr: max({__name__="vllm:kv_cache_usage_perc", namespace="code-place-prod"}) > 0.9
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: code-place-prod
          annotations:
            summary: "vLLM KV cache usage is high"
            description: "vLLM KV cache usage has been above 90% for 10 minutes."
        - alert: VLLMRequestLatencyHigh
          expr: histogram_quantile(0.95, sum by (le) (rate({__name__="vllm:e2e_request_latency_seconds_bucket", namespace="code-place-prod"}[10m]))) > 60
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: code-place-prod
          annotations:
            summary: "vLLM request latency is high"
            description: "vLLM p95 end-to-end request latency has been above 60 seconds for 10 minutes."
        - alert: AIHintBackendErrors
          expr: sum by (namespace, status) (increase(codeplace_ai_hint_requests_total{namespace=~"code-place-(dev|prod)", status=~"request_error|stream_parse_error|error"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Backend AI hint stream failures detected"
            description: "Backend AI hint streaming has reported request, parse, or internal errors in the last 5 minutes. Check backend logs, vLLM Service endpoint, vLLM metrics, and request_id-linked traces."
        - alert: AIHintBackendLatencyHigh
          expr: histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_ai_hint_duration_seconds_bucket{namespace=~"code-place-(dev|prod)", status="success"}[10m]))) > 120
          for: 10m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Backend AI hint stream latency is high"
            description: "Backend AI hint successful stream p95 duration has been above 120 seconds for 10 minutes. Check vLLM queue, GPU utilization, and client stream behavior."
        - alert: AIHintAPIFailures
          expr: sum by (namespace, scope, status) (increase(codeplace_ai_hint_api_outcome_total{namespace=~"code-place-(dev|prod)", status=~"llm_error|unexpected_error|empty_response"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "User-facing AI hint API failures detected"
            description: "AI hint API returned LLM errors, unexpected errors, or empty responses in the last 5 minutes. Compare API outcome status with backend stream and vLLM panels."
        - alert: DCGMExporterUnavailable
          expr: (kube_daemonset_status_desired_number_scheduled{namespace="monitoring", daemonset="dcgm-exporter"} == 0) or (kube_daemonset_status_number_available{namespace="monitoring", daemonset="dcgm-exporter"} < kube_daemonset_status_desired_number_scheduled{namespace="monitoring", daemonset="dcgm-exporter"}) or absent(kube_daemonset_status_desired_number_scheduled{namespace="monitoring", daemonset="dcgm-exporter"})
          for: 2m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "DCGM exporter is not running on the GPU node"
            description: "The NVIDIA DCGM exporter DaemonSet is unavailable for 2 minutes. GPU utilization, memory, temperature, and XID metrics may be missing."
        - alert: GPUUtilizationHigh
          expr: max by (Hostname, gpu, UUID) (DCGM_FI_DEV_GPU_UTIL{namespace="monitoring"}) > 95
          for: 15m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "GPU utilization is high"
            description: "DCGM reports GPU utilization above 95% for 15 minutes. vLLM AI hint latency may rise under sustained load."
        - alert: GPUMemoryHigh
          expr: max by (Hostname, gpu, UUID) (DCGM_FI_DEV_FB_USED{namespace="monitoring"} / clamp_min(DCGM_FI_DEV_FB_USED{namespace="monitoring"} + DCGM_FI_DEV_FB_FREE{namespace="monitoring"}, 1)) > 0.9
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "GPU framebuffer memory usage is high"
            description: "DCGM reports GPU framebuffer memory usage above 90% for 10 minutes. vLLM KV cache and max sequence settings should be checked."
        - alert: GPUTemperatureHigh
          expr: max by (Hostname, gpu, UUID) (DCGM_FI_DEV_GPU_TEMP{namespace="monitoring"}) > 85
          for: 10m
          labels:
            severity: warning
            priority: P1
            namespace: monitoring
          annotations:
            summary: "GPU temperature is high"
            description: "DCGM reports GPU temperature above 85C for 10 minutes. Node cooling and sustained vLLM load should be checked."
        - alert: CodePlaceNodePressure
          expr: kube_node_status_condition{condition=~"MemoryPressure|DiskPressure|PIDPressure", status="true"} == 1
          for: 5m
          labels:
            severity: warning
            priority: P1
          annotations:
            summary: "Kubernetes node is under pressure"
            description: "A Kubernetes node has reported memory, disk, or PID pressure for 5 minutes."
