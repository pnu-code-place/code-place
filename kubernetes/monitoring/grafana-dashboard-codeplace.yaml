apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-codeplace
  labels:
    grafana_dashboard: "1"
data:
  codeplace-overview.json: |
    {
      "uid": "codeplace-overview",
      "title": "CodePlace Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["codeplace"],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(up{job=\"backend\", namespace=~\"code-place-(dev|prod)\"}, namespace)",
            "refresh": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {
              "text": "All",
              "value": ".*"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Backend Request Rate",
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 8},
          "targets": [
            {"expr": "sum by (namespace) (rate(codeplace_http_requests_total{namespace=~\"$namespace\"}[5m]))", "legendFormat": "{{namespace}} requests/s"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend 5xx Rate",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 8},
          "targets": [
            {"expr": "sum by (namespace) (rate(codeplace_http_requests_total{namespace=~\"$namespace\", status_code=~\"5..\"}[5m]))", "legendFormat": "{{namespace}} 5xx/s"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend p95 Latency",
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 8},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_http_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])))", "legendFormat": "{{namespace}} p95"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Submission Status",
          "gridPos": {"x": 0, "y": 8, "w": 8, "h": 8},
          "targets": [
            {"expr": "codeplace_submission_status_count{namespace=~\"$namespace\"}", "legendFormat": "{{namespace}} {{status}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Judge Waiting Queue",
          "gridPos": {"x": 8, "y": 8, "w": 8, "h": 8},
          "targets": [
            {"expr": "codeplace_waiting_queue_length{namespace=~\"$namespace\"}", "legendFormat": "{{namespace}} waiting"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Judge Heartbeat Age",
          "gridPos": {"x": 16, "y": 8, "w": 8, "h": 8},
          "targets": [
            {"expr": "codeplace_judge_server_last_heartbeat_age_seconds{namespace=~\"$namespace\"}", "legendFormat": "{{namespace}} {{hostname}}"}
          ]
        }
      ]
    }
