apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-codeplace
  labels:
    grafana_dashboard: "1"
data:
  codeplace-overview.json: |
    {
      "uid": "codeplace-overview",
      "title": "CodePlace Overview",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["codeplace"],
      "editable": true,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(up{job=\"backend\", namespace=~\"code-place-(dev|prod)\"}, namespace)",
            "refresh": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {
              "text": "All",
              "value": ".*"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Backend Up",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "min by (namespace) (up{job=\"backend\", namespace=~\"$namespace\"})", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "stat",
          "title": "Request Rate",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum by (namespace) (rate(codeplace_http_requests_total{namespace=~\"$namespace\"}[5m]))", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "stat",
          "title": "5xx Ratio",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.01},
                  {"color": "red", "value": 0.05}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "((sum by (namespace) (rate(codeplace_http_requests_total{namespace=~\"$namespace\", status_code=~\"5..\"}[5m])) or (sum by (namespace) (rate(codeplace_http_requests_total{namespace=~\"$namespace\"}[5m])) * 0)) / clamp_min(sum by (namespace) (rate(codeplace_http_requests_total{namespace=~\"$namespace\"}[5m])), 0.001)", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "stat",
          "title": "p95 Latency",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 2}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_http_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])))", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "stat",
          "title": "Judge Waiting Queue",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 3},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "codeplace_waiting_queue_length{namespace=~\"$namespace\"}", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "stat",
          "title": "Judge Available",
          "gridPos": {"x": 20, "y": 0, "w": 4, "h": 4},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum by (namespace) (codeplace_judge_server_available{namespace=~\"$namespace\"})", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend Requests by Status",
          "gridPos": {"x": 0, "y": 4, "w": 8, "h": 8},
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [
            {"expr": "sum by (namespace, status_code) (rate(codeplace_http_requests_total{namespace=~\"$namespace\"}[5m]))", "legendFormat": "{{namespace}} {{status_code}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Backend Latency",
          "gridPos": {"x": 8, "y": 4, "w": 8, "h": 8},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_http_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])))", "legendFormat": "{{namespace}} p95"},
            {"expr": "histogram_quantile(0.99, sum by (namespace, le) (rate(codeplace_http_request_duration_seconds_bucket{namespace=~\"$namespace\"}[5m])))", "legendFormat": "{{namespace}} p99"}
          ]
        },
        {
          "type": "bargauge",
          "title": "Submission Status",
          "gridPos": {"x": 16, "y": 4, "w": 8, "h": 8},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "codeplace_submission_status_count{namespace=~\"$namespace\"}", "legendFormat": "{{namespace}} {{status}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Judge Duration p95",
          "gridPos": {"x": 0, "y": 12, "w": 8, "h": 8},
          "fieldConfig": {"defaults": {"unit": "s"}},
          "targets": [
            {"expr": "histogram_quantile(0.95, sum by (namespace, le) (rate(codeplace_submission_judge_duration_seconds_bucket{namespace=~\"$namespace\"}[10m])))", "legendFormat": "{{namespace}} judge p95"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Judge Heartbeat Max Age",
          "gridPos": {"x": 8, "y": 12, "w": 8, "h": 8},
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 120},
                  {"color": "red", "value": 180}
                ]
              }
            }
          },
          "targets": [
            {"expr": "max by (namespace) (codeplace_judge_server_last_heartbeat_age_seconds{namespace=~\"$namespace\"})", "legendFormat": "{{namespace}} max age"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Judge Server Load",
          "gridPos": {"x": 16, "y": 12, "w": 8, "h": 8},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "topk(10, codeplace_judge_server_task_number{namespace=~\"$namespace\"})", "legendFormat": "{{namespace}} {{hostname}} tasks"}
          ]
        },
        {
          "type": "row",
          "title": "Platform",
          "gridPos": {"x": 0, "y": 20, "w": 24, "h": 1},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Pod Ready",
          "gridPos": {"x": 0, "y": 21, "w": 6, "h": 5},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "min by (namespace, pod) (kube_pod_status_ready{namespace=~\"$namespace\", condition=\"true\", pod=~\"backend-.*|frontend-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*\"})", "legendFormat": "{{namespace}} {{pod}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod Restarts",
          "gridPos": {"x": 6, "y": 21, "w": 6, "h": 5},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\", pod=~\"backend-.*|frontend-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*\"}[1h]))", "legendFormat": "{{namespace}} {{pod}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Container CPU Usage",
          "gridPos": {"x": 12, "y": 21, "w": 6, "h": 5},
          "fieldConfig": {"defaults": {"unit": "cores"}},
          "targets": [
            {"expr": "topk(10, sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\", container!=\"\", pod=~\"backend-.*|frontend-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*\"}[5m])))", "legendFormat": "{{namespace}} {{pod}} {{container}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Container Memory Usage",
          "gridPos": {"x": 18, "y": 21, "w": 6, "h": 5},
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "targets": [
            {"expr": "topk(10, container_memory_working_set_bytes{namespace=~\"$namespace\", container!=\"\", pod=~\"backend-.*|frontend-.*|celery-.*|judge-server-.*|postgres-.*|redis-.*\"})", "legendFormat": "{{namespace}} {{pod}} {{container}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "PVC Usage",
          "gridPos": {"x": 0, "y": 26, "w": 12, "h": 6},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.75},
                  {"color": "red", "value": 0.85}
                ]
              }
            }
          },
          "targets": [
            {"expr": "max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"}) / clamp_min(max by (namespace, persistentvolumeclaim) (kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"}), 1)", "legendFormat": "{{namespace}} {{persistentvolumeclaim}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Node Pressure",
          "gridPos": {"x": 12, "y": 26, "w": 12, "h": 6},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "kube_node_status_condition{condition=~\"MemoryPressure|DiskPressure|PIDPressure\", status=\"true\"}", "legendFormat": "{{node}} {{condition}}"}
          ]
        },
        {
          "type": "row",
          "title": "Data Stores",
          "gridPos": {"x": 0, "y": 32, "w": 24, "h": 1},
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "title": "PostgreSQL Ready",
          "gridPos": {"x": 0, "y": 33, "w": 6, "h": 5},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "min by (namespace) (kube_pod_status_ready{namespace=~\"$namespace\", condition=\"true\", pod=~\"postgres-[0-9]+\"})", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "stat",
          "title": "Redis Ready",
          "gridPos": {"x": 6, "y": 33, "w": 6, "h": 5},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "min by (namespace) (kube_pod_status_ready{namespace=~\"$namespace\", condition=\"true\", pod=~\"redis-.*|redis-replication-.*\"})", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "PostgreSQL Restarts",
          "gridPos": {"x": 12, "y": 33, "w": 6, "h": 5},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\", pod=~\"postgres-.*\"}[1h]))", "legendFormat": "{{namespace}} {{pod}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Redis Restarts",
          "gridPos": {"x": 18, "y": 33, "w": 6, "h": 5},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\", pod=~\"redis-.*|redis-replication-.*\"}[1h]))", "legendFormat": "{{namespace}} {{pod}}"}
          ]
        }
      ]
    }
