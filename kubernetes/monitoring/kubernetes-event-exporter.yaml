apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-event-exporter
  labels:
    app.kubernetes.io/name: kubernetes-event-exporter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-event-exporter
  labels:
    app.kubernetes.io/name: kubernetes-event-exporter
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-event-exporter
  labels:
    app.kubernetes.io/name: kubernetes-event-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-event-exporter
subjects:
  - kind: ServiceAccount
    name: kubernetes-event-exporter
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-event-exporter-config
  labels:
    app.kubernetes.io/name: kubernetes-event-exporter
data:
  config.yaml: |
    logLevel: warn
    logFormat: json
    maxEventAgeSeconds: 60
    metricsNamePrefix: event_exporter_
    route:
      routes:
        - drop:
            - type: "Normal"
          match:
            - namespace: "code-place-dev|code-place-prod|monitoring|longhorn-system|kube-system"
              receiver: "stdout"
    receivers:
      - name: "stdout"
        stdout:
          deDot: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-event-exporter
  labels:
    app.kubernetes.io/name: kubernetes-event-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-event-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-event-exporter
    spec:
      serviceAccountName: kubernetes-event-exporter
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: event-exporter
          image: ghcr.io/resmoio/kubernetes-event-exporter:v1.7
          imagePullPolicy: IfNotPresent
          args:
            - -conf=/data/config.yaml
          ports:
            - name: metrics
              containerPort: 2112
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /data
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: kubernetes-event-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-event-exporter
  labels:
    app.kubernetes.io/name: kubernetes-event-exporter
spec:
  selector:
    app.kubernetes.io/name: kubernetes-event-exporter
  ports:
    - name: metrics
      port: 2112
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kubernetes-event-exporter
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-event-exporter
  jobLabel: app.kubernetes.io/name
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
