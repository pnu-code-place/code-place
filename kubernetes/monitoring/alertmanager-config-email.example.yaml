# Optional email fallback for CodePlace alerts.
#
# Do not add this file to kustomization.yaml until SMTP values are available.
# Required secret:
#
# kubectl -n monitoring create secret generic alertmanager-email \
#   --from-literal=smtp-auth-password="$SMTP_AUTH_PASSWORD" \
#   --dry-run=client -o yaml | kubectl apply -f -
#
# Replace smarthost, from, to, and authUsername before applying.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: codeplace-alert-email-fallback
  labels:
    alertmanagerConfig: codeplace
spec:
  route:
    groupBy:
      - alertname
      - priority
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 1h
    receiver: unmatched-muted
    routes:
      - matchers:
          - name: priority
            value: P0
        groupWait: 10s
        groupInterval: 1m
        repeatInterval: 15m
        receiver: p0-email
      - matchers:
          - name: priority
            value: P1
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 1h
        receiver: p1-email
  receivers:
    - name: unmatched-muted
    - name: p0-email
      emailConfigs:
        - sendResolved: true
          smarthost: smtp.example.com:587
          from: codeplace-alerts@example.com
          to: oncall@example.com
          authUsername: codeplace-alerts@example.com
          authPassword:
            name: alertmanager-email
            key: smtp-auth-password
          requireTLS: true
          headers:
            - key: Subject
              value: '[{{ .Status }}][P0] {{ .CommonLabels.alertname }}'
          html: '{{ .CommonAnnotations.summary }}<br>{{ .CommonAnnotations.description }}'
    - name: p1-email
      emailConfigs:
        - sendResolved: true
          smarthost: smtp.example.com:587
          from: codeplace-alerts@example.com
          to: oncall@example.com
          authUsername: codeplace-alerts@example.com
          authPassword:
            name: alertmanager-email
            key: smtp-auth-password
          requireTLS: true
          headers:
            - key: Subject
              value: '[{{ .Status }}][P1] {{ .CommonLabels.alertname }}'
          html: '{{ .CommonAnnotations.summary }}<br>{{ .CommonAnnotations.description }}'
