apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-codeplace-logs
  labels:
    grafana_dashboard: "1"
data:
  codeplace-logs.json: |
    {
      "uid": "codeplace-logs",
      "title": "CodePlace Logs",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["codeplace", "logs"],
      "editable": true,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "custom",
            "query": "code-place-dev,code-place-prod,monitoring",
            "multi": true,
            "includeAll": true,
            "allValue": "code-place-dev|code-place-prod|monitoring",
            "current": {
              "text": "code-place-dev",
              "value": "code-place-dev"
            }
          },
          {
            "name": "request_id",
            "type": "textbox",
            "query": ".*",
            "current": {
              "text": ".*",
              "value": ".*"
            }
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Loki Ready Replicas",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum(kube_pod_status_ready{namespace=\"monitoring\", condition=\"true\", pod=~\"loki-[0-9]+\"}) or vector(0)", "legendFormat": "single-binary"},
            {"expr": "sum(kube_pod_status_ready{namespace=\"monitoring\", condition=\"true\", pod=~\"loki-gateway-.*\"}) or vector(0)", "legendFormat": "gateway"}
          ]
        },
        {
          "type": "stat",
          "title": "Alloy Nodes",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "kube_daemonset_status_number_available{namespace=\"monitoring\", daemonset=\"alloy\"} or vector(0)", "legendFormat": "available"},
            {"expr": "kube_daemonset_status_desired_number_scheduled{namespace=\"monitoring\", daemonset=\"alloy\"} or vector(0)", "legendFormat": "desired"}
          ]
        },
        {
          "type": "stat",
          "title": "Loki PVC Usage",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 0.75},
                  {"color": "red", "value": 0.85}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "max(kubelet_volume_stats_used_bytes{namespace=\"monitoring\", persistentvolumeclaim=~\".*loki.*\"}) / clamp_min(max(kubelet_volume_stats_capacity_bytes{namespace=\"monitoring\", persistentvolumeclaim=~\".*loki.*\"}), 1) or vector(0)", "legendFormat": "usage"}
          ]
        },
        {
          "type": "stat",
          "title": "Log Lines",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum(count_over_time({namespace=~\"$namespace\"}[5m]))", "legendFormat": "lines"}
          ]
        },
        {
          "type": "stat",
          "title": "Backend Errors",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum(count_over_time({namespace=~\"$namespace\", app=\"backend\"} | json | level=\"ERROR\" [5m]))", "legendFormat": "errors"}
          ]
        },
        {
          "type": "stat",
          "title": "Frontend 5xx",
          "gridPos": {"x": 20, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum(count_over_time({namespace=~\"$namespace\", app=\"frontend\"} | json | status_code >= 500 [5m]))", "legendFormat": "5xx"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Log Lines by Namespace",
          "gridPos": {"x": 0, "y": 4, "w": 8, "h": 7},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {"defaults": {"unit": "logs/sec"}},
          "targets": [
            {"expr": "sum by (namespace) (rate({namespace=~\"code-place-dev|code-place-prod|monitoring|kube-system\"}[5m]))", "legendFormat": "{{namespace}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Application Log Lines by App",
          "gridPos": {"x": 8, "y": 4, "w": 8, "h": 7},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {"defaults": {"unit": "logs/sec"}},
          "targets": [
            {"expr": "sum by (namespace, app) (rate({namespace=~\"code-place-dev|code-place-prod\", app=~\"backend|frontend\"}[5m]))", "legendFormat": "{{namespace}} {{app}}"},
            {"expr": "sum by (namespace, container) (rate({namespace=~\"code-place-dev|code-place-prod\", container=~\"celery-worker|celery-beat|judge-server|hub-auth|vllm\"}[5m]))", "legendFormat": "{{namespace}} {{container}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Structured Error Logs by Component",
          "gridPos": {"x": 16, "y": 4, "w": 8, "h": 7},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {"defaults": {"unit": "logs/sec"}},
          "targets": [
            {"expr": "sum by (namespace, app) (rate({namespace=~\"code-place-dev|code-place-prod\", app=~\"backend|frontend\"} | json | level=~\"ERROR|CRITICAL\" [5m]))", "legendFormat": "{{namespace}} {{app}}"},
            {"expr": "sum by (namespace, container) (rate({namespace=~\"code-place-dev|code-place-prod\", container=~\"celery-worker|celery-beat|judge-server|hub-auth|vllm\"} | json | level=~\"ERROR|CRITICAL\" [5m]))", "legendFormat": "{{namespace}} {{container}}"}
          ]
        },
        {
          "type": "stat",
          "title": "Ingress 5xx",
          "gridPos": {"x": 0, "y": 11, "w": 4, "h": 4},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            }
          },
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "values": false}},
          "targets": [
            {"expr": "sum(count_over_time({namespace=\"kube-system\", app_kubernetes_io_name=\"traefik\"} | json | DownstreamStatus >= 500 [5m]))", "legendFormat": "5xx"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Log Lines by Node",
          "gridPos": {"x": 0, "y": 15, "w": 4, "h": 6},
          "datasource": {"type": "loki", "uid": "Loki"},
          "fieldConfig": {"defaults": {"unit": "logs/sec"}},
          "targets": [
            {"expr": "sum by (node) (rate({namespace=~\"code-place-dev|code-place-prod|monitoring|kube-system\"}[5m]))", "legendFormat": "{{node}}"}
          ]
        },
        {
          "type": "logs",
          "title": "Recent Backend Errors",
          "gridPos": {"x": 4, "y": 11, "w": 10, "h": 10},
          "datasource": {"type": "loki", "uid": "Loki"},
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "dedupStrategy": "none"
          },
          "targets": [
            {"expr": "{namespace=~\"$namespace\", app=\"backend\"} | json | level=\"ERROR\""}
          ]
        },
        {
          "type": "logs",
          "title": "Auth, Judge, Celery, and vLLM Logs",
          "gridPos": {"x": 14, "y": 11, "w": 10, "h": 10},
          "datasource": {"type": "loki", "uid": "Loki"},
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "dedupStrategy": "none"
          },
          "targets": [
            {"expr": "{namespace=~\"$namespace\", container=~\"hub-auth|celery-worker|celery-beat|judge-server|vllm\"}"}
          ]
        },
        {
          "type": "logs",
          "title": "Ingress and Frontend 4xx/5xx Logs",
          "gridPos": {"x": 0, "y": 21, "w": 24, "h": 8},
          "datasource": {"type": "loki", "uid": "Loki"},
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "dedupStrategy": "none"
          },
          "targets": [
            {"expr": "{namespace=\"kube-system\", app_kubernetes_io_name=\"traefik\"} | json | DownstreamStatus >= 400", "legendFormat": "traefik"},
            {"expr": "{namespace=~\"$namespace\", app=\"frontend\"} | json | status_code >= 400", "legendFormat": "frontend"}
          ]
        },
        {
          "type": "logs",
          "title": "Request ID Lookup",
          "gridPos": {"x": 0, "y": 29, "w": 24, "h": 9},
          "datasource": {"type": "loki", "uid": "Loki"},
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "dedupStrategy": "none"
          },
          "targets": [
            {"expr": "{namespace=~\"$namespace\"} | json | request_id=~\"$request_id\""}
          ]
        },
        {
          "type": "logs",
          "title": "Frontend Runtime Error Reports",
          "gridPos": {"x": 0, "y": 38, "w": 24, "h": 8},
          "datasource": {"type": "loki", "uid": "Loki"},
          "options": {
            "showLabels": false,
            "showTime": true,
            "wrapLogMessage": true,
            "dedupStrategy": "none"
          },
          "targets": [
            {"expr": "{namespace=~\"$namespace\", app=\"backend\"} | json | logger=\"frontend.error\""}
          ]
        },
        {
          "type": "timeseries",
          "title": "Loki Ingestion Rate",
          "gridPos": {"x": 0, "y": 46, "w": 8, "h": 7},
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "logs/sec"}},
          "targets": [
            {"expr": "sum(rate(loki_distributor_lines_received_total{namespace=\"monitoring\"}[5m])) or vector(0)", "legendFormat": "lines received"},
            {"expr": "sum(rate(loki_distributor_bytes_received_total{namespace=\"monitoring\"}[5m])) or vector(0)", "legendFormat": "bytes received"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Loki Request Errors",
          "gridPos": {"x": 8, "y": 46, "w": 8, "h": 7},
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "reqps"}},
          "targets": [
            {"expr": "sum by (route, status_code) (rate(loki_request_duration_seconds_count{namespace=\"monitoring\", status_code=~\"5..\"}[5m])) or vector(0)", "legendFormat": "{{route}} {{status_code}}"},
            {"expr": "sum by (route, status_code) (rate(loki_request_duration_seconds_count{namespace=\"monitoring\", status_code=~\"4..\"}[5m])) or vector(0)", "legendFormat": "{{route}} {{status_code}}"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Alloy Loki Write Backpressure",
          "gridPos": {"x": 16, "y": 46, "w": 8, "h": 7},
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "sum(rate(loki_write_batch_retries_total{namespace=\"monitoring\"}[5m])) or vector(0)", "legendFormat": "batch retries/s"},
            {"expr": "sum(rate(loki_write_dropped_entries_total{namespace=\"monitoring\"}[5m])) or vector(0)", "legendFormat": "dropped entries/s"}
          ]
        },
        {
          "type": "timeseries",
          "title": "Loki Canary Missing Entries",
          "gridPos": {"x": 0, "y": 53, "w": 8, "h": 6},
          "datasource": "Prometheus",
          "fieldConfig": {"defaults": {"unit": "short"}},
          "targets": [
            {"expr": "sum(increase(loki_canary_missing_entries_total{namespace=\"monitoring\"}[5m])) or vector(0)", "legendFormat": "missing entries"}
          ]
        }
      ]
    }
