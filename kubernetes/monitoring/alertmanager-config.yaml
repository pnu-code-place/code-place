apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: codeplace-alert-routing
  labels:
    alertmanagerConfig: codeplace
spec:
  route:
    groupBy:
      - alertname
      - priority
      - namespace
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 1h
    receiver: unmatched-muted
    routes:
      - matchers:
          - name: priority
            value: P0
        groupWait: 10s
        groupInterval: 1m
        repeatInterval: 15m
        receiver: p0-discord
      - matchers:
          - name: priority
            value: P1
          - name: namespace
            value: code-place-dev
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 1h
        receiver: dev-p1-muted
      - matchers:
          - name: priority
            value: P1
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 1h
        receiver: p1-discord
  receivers:
    - name: unmatched-muted
    - name: p0-discord
      discordConfigs:
        - sendResolved: true
          apiURL:
            name: alertmanager-contact-points
            key: webhook-url
          title: '[{{ .Status }}][P0] {{ .CommonLabels.alertname }}'
          content: '{{ .CommonAnnotations.summary }}'
          message: |-
            {{ .CommonAnnotations.description }}

            Priority: {{ .CommonLabels.priority }}
            Namespace: {{ .CommonLabels.namespace }}
            Overview: https://monitoring.code-place-dev.site/d/codeplace-overview/codeplace-overview?orgId=1&var-namespace={{ .CommonLabels.namespace }}
            Logs: https://monitoring.code-place-dev.site/d/codeplace-logs/codeplace-logs?orgId=1&var-namespace={{ .CommonLabels.namespace }}
            Monitoring: https://monitoring.code-place-dev.site/d/codeplace-monitoring-stack/codeplace-monitoring-stack?orgId=1
            Runbook: https://github.com/pnu-code-place/code-place/blob/develop/docs/content/developer/infra/observability-runbook/_index.md
            Source: {{ range .Alerts }}{{ .GeneratorURL }}{{ end }}
          username: CodePlace Alertmanager
    - name: dev-p1-muted
    - name: p1-discord
      discordConfigs:
        - sendResolved: true
          apiURL:
            name: alertmanager-contact-points
            key: webhook-url
          title: '[{{ .Status }}][P1] {{ .CommonLabels.alertname }}'
          content: '{{ .CommonAnnotations.summary }}'
          message: |-
            {{ .CommonAnnotations.description }}

            Priority: {{ .CommonLabels.priority }}
            Namespace: {{ .CommonLabels.namespace }}
            Overview: https://monitoring.code-place-dev.site/d/codeplace-overview/codeplace-overview?orgId=1&var-namespace={{ .CommonLabels.namespace }}
            Logs: https://monitoring.code-place-dev.site/d/codeplace-logs/codeplace-logs?orgId=1&var-namespace={{ .CommonLabels.namespace }}
            Monitoring: https://monitoring.code-place-dev.site/d/codeplace-monitoring-stack/codeplace-monitoring-stack?orgId=1
            Runbook: https://github.com/pnu-code-place/code-place/blob/develop/docs/content/developer/infra/observability-runbook/_index.md
            Source: {{ range .Alerts }}{{ .GeneratorURL }}{{ end }}
          username: CodePlace Alertmanager
