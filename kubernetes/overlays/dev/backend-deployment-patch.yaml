apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    spec:
      containers:
        - name: backend
          envFrom:
            - configMapRef:
                name: sentry-release
          env:
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://k3s.code-place-dev.site"
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: sentry-secret
                  key: SENTRY_DSN
            - name: SENTRY_ENVIRONMENT
              value: "dev"
            - name: OTEL_ENABLED
              value: "1"
